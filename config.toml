[plugin]
enabled = false
config_version = "1.0.0"

[admin]
admins = []
allow_group_owner = true
owner_allowed_commands = []
deny_response = "silent"

[identity]
bot_nickname = "麦麦"
auto_detect = true
bot_qq = ""

[identity.override_roles]

[auto_moderate]
enabled = true
re_inject_interval_messages = 10
re_inject_interval_seconds = 1800
enabled_groups = []

[safeguard]
max_mute_duration = 3600
kick_require_confirm = true
mute_cooldown = 300
daily_mute_limit = 10
daily_kick_limit = 3
protected_users = []
auto_exempt_admins = true

[safeguard.exempt_users]

[warning]
enabled = true
spam_warn_threshold = 3
spam_warn_window = 600
abuse_warn_threshold = 1
abuse_warn_window = 3600
ad_warn_threshold = 1
ad_warn_window = 1800

[escalation]
enabled = true
escalation_steps = []

# [[escalation.escalation_steps]]
# within_hours = 24
# count = 1
# action = "mute"
# max_duration = 600

# [[escalation.escalation_steps]]
# within_hours = 24
# count = 2
# action = "mute"
# max_duration = 1800

# [[escalation.escalation_steps]]
# within_hours = 72
# count = 3
# action = "kick"

[auto_approve]
enabled = false
default_action = "ignore"
require_message_keywords = []
reject_keywords = []
max_pending_seconds = 300
daily_approve_limit = 5
daily_reject_limit = 10
check_interval_seconds = 120

# [[auto_approve.groups]]
# group_id = "123456789"
# default_action = "approve"
# require_keywords = ""
# reject_keywords = "广告, 推广"
# daily_approve_limit = 5
# daily_reject_limit = 10

[logging]
max_log_entries = 2000
default_log_lines = 10
verbose_logging = false

[prompts]
auto_moderate_system = "【群管理行为参考 — 请在保持你原本人设和说话风格的前提下使用以下规则】\n\n你是本群的{bot_role}，拥有这些管理工具：{available_actions}。\n\n违规处理参考（以人设语气自然执行，不要切换成'管理员口吻'）：\n  广告/诈骗链接 → 撤回，可视情况禁言10-30分钟\n  连续刷屏 → 用你的人设语气提醒一句，继续刷再禁言5-10分钟\n  辱骂/人身攻击 → 撤回，禁言1-6小时，再犯可踢出\n  色情/违法内容 → 撤回并踢出\n  高质量分享 → 可以用设精华的方式表达赞赏\n  不确定的擦边内容 → 先观察，别着急动手\n\n操作提示：\n  警告和禁言直接调用工具，参数填 group_id 和 user_id\n  踢人前务必先调 group_get_member 确认目标身份\n  撤回和设精华需要 message_id，让用户回复目标消息后获取\n\n节奏控制：\n  正常聊天时做你自己，别主动进入'审查模式'\n  只在确实发现违规时才动用工具，不要生成'无异常'之类的报告\n  管理操作融入你的人设语气，不要说'已将xxx禁言'，用一个自然的方式带过就好"
command_denied_message = "你没有权限执行此操作。"
