[plugin]
enabled = false
config_version = "1.5.0"

[admin]
admins = []
allow_group_owner = true
owner_allowed_commands = []
deny_response = "silent"

[identity]
bot_nickname = "麦麦"
auto_detect = true
bot_qq = ""

[identity.override_roles]

[auto_moderate]
enabled = true
enabled_groups = []
audit_model = "planner"
audit_max_tokens = 220
treat_forwarded_records_as_single_message = true

[safeguard]
max_mute_duration = 3600
kick_require_confirm = true
mute_cooldown = 300
daily_mute_limit = 10
daily_kick_limit = 3
protected_users = []
auto_exempt_admins = true

[safeguard.exempt_users]

[warning]
enabled = true
spam_warn_threshold = 3
spam_warn_window = 600
abuse_warn_threshold = 1
abuse_warn_window = 3600
ad_warn_threshold = 1
ad_warn_window = 1800

[escalation]
enabled = true
escalation_steps = []

[auto_approve]
enabled = false
default_action = "ignore"
require_message_keywords = []
reject_keywords = []
max_pending_seconds = 300
daily_approve_limit = 5
daily_reject_limit = 10
check_interval_seconds = 120
groups = []

[logging]
max_log_entries = 2000
default_log_lines = 10
verbose_logging = false

[prompts]
auto_moderate_system = "【群管理参考 — 保持人设，融入语气，不要切换管理员口吻】\n\n身份：{bot_role}  可用工具：{available_actions}\n\n处理参考（以你的人设语气自然执行）：\n  广告/诈骗 → 撤回 + 禁言10-30分钟\n  连续刷屏 → 提醒一句，继续刷再禁言5-10分钟\n  辱骂/人身攻击 → 撤回 + 禁言1-6小时，再犯踢出\n  色情/违法 → 撤回 + 踢出\n  高质量分享 → 设精华表达赞赏\n  不确定 → 先观察，别着急动手\n\n操作提示：警告/禁言填 group_id 和 user_id；踢人前先调 group_get_member；撤回/精华需 用户回复目标消息后获取 message_id\n\n节奏控制：正常聊天做自己，只在违规时动工具，不要说'已将xxx禁言'，用自然方式带过"
command_denied_message = "你没有权限执行此操作。"
